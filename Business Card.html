<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="design_doc_mode" content="canvas" />
<title>Priority Construction — Business Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --page-bg: #FBFAF7;
    --ink: #1C1813;
    --body: #585349;
    --muted: #8D887D;
    --line: #E2DDD2;
    --white: #FFFFFF;
    --gold: #C9A227;
    --gold-d: #9A7715;
    --serif: "Newsreader", serif;
    --sans: "Hanken Grotesk", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--page-bg); font-family: var(--sans); }

  h1 { font: 500 15px/1 var(--sans); letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin: 0 0 18px; }

  /* card = standard 100mm x 65mm @ ~300px/in for crisp screen + print sizing */
  .card {
    width: 1181px; height: 768px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 18px 50px -18px rgba(28,24,19,0.35);
    border-radius: 14px;
  }
  .card__pair { display: flex; gap: 48px; }

  /* ── Variation A: wave-split ink/gold/cream, logo right ── */
  .a-front { background: var(--page-bg); position: relative; }
  .a-front .wave { position: absolute; inset: 0; width: 100%; height: 100%; }
  .a-front .inner { position: absolute; inset: 0; display: flex; }
  .a-front .main { width: 620px; flex-shrink: 0; padding: 58px 0 58px 66px; display: flex; flex-direction: column; position: relative; z-index: 2; }
  .a-front .brand { font-size: 18px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 32px; }
  .a-front .name { font-family: var(--serif); font-weight: 500; font-size: 82px; color: var(--white); margin: 0 0 12px; letter-spacing: -0.005em; line-height: 1.0; }
  .a-front .role { font-size: 21px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); }
  .a-front .rule { height: 2px; width: 70px; background: var(--gold); margin: 30px 0 32px; }
  .a-front .rows { display: flex; flex-direction: column; gap: 22px; margin-top: auto; }
  .a-front .row { display: flex; align-items: center; gap: 18px; font-size: 25px; color: rgba(255,255,255,0.95); font-weight: 500; line-height: 1.28; }
  .a-front .row svg { width: 26px; height: 26px; flex-shrink: 0; stroke: var(--gold); }
  .a-front .brandmark { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 26px; position: relative; z-index: 2; padding-right: 20px; padding-left: 110px; }
  .a-front .brandmark img { width: 270px; height: auto; }
  .a-front .brandmark .word { font-family: var(--sans); font-weight: 700; font-size: 24px; letter-spacing: 0.14em; color: var(--ink); text-align: center; }

  .a-back { background: var(--page-bg); position: relative; overflow: hidden; }
  .a-back .corner { position: absolute; left: 0; bottom: 0; width: 382px; height: 281px; }
  .a-back .inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  .a-back .glyph { height: 216px; width: auto; }
  .a-back .brandgroup { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .a-back .word { font-family: var(--sans); font-weight: 700; font-size: 30px; letter-spacing: 0.2em; color: var(--ink); text-align: center; }
  .a-back .pty { font-family: var(--sans); font-weight: 600; font-size: 16px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold-d); }
  .a-back .tag { font-family: var(--serif); font-style: italic; font-size: 18px; color: var(--muted); }

  /* ── Variation B removed ── */

  .group { position: absolute; }
  .g1 { top: 60px; left: 60px; }

  a { color: inherit; text-decoration: none; }
</style>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#1C1813" />
    <rect x="20" y="34" width="60" height="32" rx="3" fill="none" stroke="#C9A227" stroke-width="3" />
    <line x1="20" y1="50" x2="80" y2="50" stroke="#C9A227" stroke-width="2" />
  </svg>
</template>
</head>
<body>

<div class="group g1">

  <div class="card__pair">
    <div class="card a-front">

        <path d="M0,0 L666,0 C721,193 643,384 699,575 C721,665 654,717 654,768 L0,768 Z" fill="#1C1813" />
      </svg>
      <div class="inner">
        <div class="main">
          <div class="brand">Priority Construction</div>

          <div class="rows">

            <div class="row"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z" opacity="0"/><path d="M22 6c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2M2 6c0-1.1.9-2 2-2h16c1.1 0 2 .9 2 2M2 6l10 7 10-7"/></svg><span>shunda@priorityconst.com.au</span></div>
            <div class="row"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span>priorityconst.net</span></div>

        </div>

        </div>
      </div>
    </div>
    <div class="card a-back">
      <svg class="corner" viewBox="0 0 382 281" preserveAspectRatio="none">
        <path d="M0,281 L0,77 C68,26 134,115 202,77 C259,46 292,115 247,180 C202,243 134,191 101,243 C79,274 44,281 0,281 Z" fill="#C9A227" opacity="0.9" />
        <path d="M0,281 L0,115 C57,71 112,141 169,108 C219,79 245,135 208,186 C169,238 112,199 84,243 C68,268 33,281 0,281 Z" fill="#1C1813" />
      </svg>
      <div class="inner">
        <img class="glyph" src="img/logo-mark-crop.png" alt="" />
        <div class="brandgroup">
          <div class="word">PRIORITY CONSTRUCTION</div>
          <div class="pty">Pty Ltd</div>
        </div>
        <div class="tag">Teamwork Makes The Dream Work</div>
      </div>
    </div>
  </div>
</div>

</body>
